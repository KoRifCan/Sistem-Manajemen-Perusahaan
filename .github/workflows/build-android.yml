name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Gradle wrapper
        run: |
          mkdir -p android/gradle/wrapper
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-all.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          curl -sL "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" -L -o android/gradle/wrapper/gradle-wrapper.jar
          chmod +x android/gradlew 2>/dev/null || true

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is not set. Add it in Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Generate launcher icons
        run: |
          convert -size 192x192 xc:'#1a73e8' -fill white \
            -font Helvetica -pointsize 140 -gravity center \
            -annotate +0+0 'S' \
            -format png /tmp/icon.png
          for dpi in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            size=48; [ "$dpi" = hdpi ] && size=72
            [ "$dpi" = xhdpi ] && size=96
            [ "$dpi" = xxhdpi ] && size=144
            [ "$dpi" = xxxhdpi ] && size=192
            mkdir -p android/app/src/main/res/mipmap-$dpi
            convert /tmp/icon.png -resize ${size}x${size} android/app/src/main/res/mipmap-$dpi/ic_launcher.png
          done

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
