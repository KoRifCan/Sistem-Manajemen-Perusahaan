name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Gradle wrapper
        run: |
          mkdir -p android/gradle/wrapper
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-all.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          curl -sL "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" -L -o android/gradle/wrapper/gradle-wrapper.jar
          chmod +x android/gradlew 2>/dev/null || true

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is not set. Add it in Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Generate launcher icons
        run: |
          pip install Pillow -q 2>/dev/null
          python3 << 'PYEOF'
          import os
          from PIL import Image, ImageDraw, ImageFont
          size = 192
          img = Image.new('RGBA', (size, size), (26, 115, 232, 255))
          draw = ImageDraw.Draw(img)
          draw.rounded_rectangle([(6, 6), (size-6, size-6)], radius=32, fill=(26, 115, 232, 255))
          try:
              font = ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf', 110)
          except Exception:
              font = ImageFont.load_default()
          bbox = draw.textbbox((0, 0), 'S', font=font)
          tw, th = bbox[2] - bbox[0], bbox[3] - bbox[1]
          draw.text(((size - tw) / 2 - bbox[0], (size - th) / 2 - bbox[1]), 'S', fill='white', font=font)
          sizes = {'mdpi': 48, 'hdpi': 72, 'xhdpi': 96, 'xxhdpi': 144, 'xxxhdpi': 192}
          for dpi, s in sizes.items():
              d = os.path.join('android/app/src/main/res', 'mipmap-' + dpi)
              os.makedirs(d, exist_ok=True)
              img.resize((s, s), Image.LANCZOS).save(os.path.join(d, 'ic_launcher.png'))
          PYEOF

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
