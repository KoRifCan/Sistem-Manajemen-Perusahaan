<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=/Sistem-Manajemen-Perusahaan/">
  <title>Redirecting...</title>
  <script>
    (function() {
      var segment = '/Sistem-Manajemen-Perusahaan';
      var path = window.location.pathname;
      if (path.startsWith(segment)) {
        path = path.substring(segment.length);
      }
      sessionStorage.redirect = path + window.location.search + window.location.hash;
      window.location.href = segment + '/';
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
